<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password | Testara</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:"Segoe UI",Arial}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
}
.card{
  background:#fff;
  width:100%;
  max-width:420px;
  padding:35px 30px;
  border-radius:16px;
  box-shadow:0 20px 40px rgba(0,0,0,.15);
}
h1{text-align:center;margin:0;color:#004aad}
.sub{text-align:center;font-size:13px;color:#666;margin-bottom:20px}
.field{margin-bottom:15px}
.field label{font-size:14px;display:block;margin-bottom:6px}
.field input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #ddd;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#004aad;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
button:disabled{opacity:.7;cursor:not-allowed}
.alert{
  display:none;
  padding:10px;
  margin-bottom:15px;
  border-radius:8px;
  font-size:13px;
}
.error{background:#fee2e2;color:#991b1b}
.success{background:#dcfce7;color:#166534}
.footer{
  margin-top:18px;
  text-align:center;
  font-size:12px;
  color:#777;
}
.small-error{
  font-size:12px;
  color:#991b1b;
  margin-top:4px;
  display:none;
}
</style>
</head>

<body>

<div class="card">
  <h1>Reset Password</h1>
  <div class="sub">Enter your registered email and set a new password</div>

  <div id="alert" class="alert"></div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="employee@company.in">
  </div>

  <div class="field">
    <label>New Password</label>
    <input type="password" id="newPassword" placeholder="Enter new password">
  </div>

  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm new password">
    <div id="matchError" class="small-error">
      New password and confirm password do not match
    </div>
  </div>

  <button id="btn" onclick="resetPassword()">Update Password</button>

  <div class="footer">
    <a href="login.html" style="color:#004aad;text-decoration:none;">Back to Login</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://qzriaykqdrhbtcgbpxpg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6cmlheWtxZHJoYnRjZ2JweHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAwMTcwMTAsImV4cCI6MjA3NTU5MzAxMH0.qRAQumkwN-JtxDizWwLRfPa8t0N68YGWdYKhQrhx7e8";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const alertBox = document.getElementById("alert");
const btn = document.getElementById("btn");
const newPassInput = document.getElementById("newPassword");
const confirmPassInput = document.getElementById("confirmPassword");
const matchError = document.getElementById("matchError");

/* Live Password Match Check */
confirmPassInput.addEventListener("input", checkPasswordMatch);
newPassInput.addEventListener("input", checkPasswordMatch);

function checkPasswordMatch(){
  if(confirmPassInput.value === "") {
    matchError.style.display = "none";
    return;
  }

  if(newPassInput.value !== confirmPassInput.value){
    matchError.style.display = "block";
    btn.disabled = true;
  }else{
    matchError.style.display = "none";
    btn.disabled = false;
  }
}

function showMessage(msg,type){
  alertBox.innerText = msg;
  alertBox.className = "alert " + type;
  alertBox.style.display = "block";
}

async function resetPassword(){
  const email = document.getElementById("email").value.trim().toLowerCase();
  const newPassword = newPassInput.value.trim();
  const confirmPassword = confirmPassInput.value.trim();

  if(!email || !newPassword || !confirmPassword){
    showMessage("All fields are required","error");
    return;
  }

  if(newPassword.length < 6){
    showMessage("Password must be at least 6 characters","error");
    return;
  }

  if(newPassword !== confirmPassword){
    showMessage("Passwords do not match","error");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Updating...";

  try{
    const { data, error } = await sb.rpc("reset_employee_password", {
      p_email: email,
      p_new_password: newPassword
    });

    if(error){
      console.error(error);
      showMessage(error.message,"error");
    }else if(data === false){
      showMessage("Email not found","error");
    }else{
      showMessage("Password updated successfully. Redirecting...","success");
      setTimeout(()=>{
        window.location.href="login.html";
      },1500);
    }

  }catch(err){
    console.error(err);
    showMessage("Something went wrong","error");
  }

  btn.disabled = false;
  btn.innerText = "Update Password";
}
</script>

</body>
</html>
