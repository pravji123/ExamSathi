<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Tests | Testara</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:"Segoe UI",Arial}
body{margin:0;background:#f4f6f8}

/* Header */
header{
  background:#004aad;color:#fff;
  padding:16px 24px;
  display:flex;justify-content:space-between;align-items:center;
}
header h1{margin:0;font-size:20px}
.logout{
  cursor:pointer;background:#fff;color:#004aad;
  padding:8px 14px;border-radius:8px;font-weight:600;
}

/* Layout */
.container{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 64px)}
aside{background:#fff;padding:20px;border-right:1px solid #ddd}
.menu a{
  display:block;padding:12px;border-radius:8px;
  text-decoration:none;color:#333;margin-bottom:8px
}
.menu a.active,.menu a:hover{background:#e0e7ff}

/* Main */
main{padding:24px}

/* Toolbar */
.toolbar{
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px
}
.toolbar input,.toolbar select{
  padding:10px;border-radius:8px;border:1px solid #ccc
}
.toolbar button{
  background:#004aad;color:#fff;border:none;
  padding:10px 14px;border-radius:8px;cursor:pointer
}

/* Card */
.card{
  background:#fff;padding:20px;border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.08)
}

/* Table */
table{width:100%;border-collapse:collapse}
th,td{padding:12px;font-size:14px;border-bottom:1px solid #eee}
th{background:#f1f5ff;text-align:left}

.status{
  padding:4px 10px;border-radius:20px;
  font-size:12px;font-weight:600
}
.draft{background:#fff3cd;color:#856404}
.published{background:#d4edda;color:#155724}
.closed{background:#f8d7da;color:#842029}

.actions button{
  padding:5px 10px;margin-right:5px;
  border:none;border-radius:6px;font-size:12px;cursor:pointer
}
.edit{background:#0d6efd;color:#fff}
.publish{background:#198754;color:#fff}
.delete{background:#dc2626;color:#fff}
.view{background:#6f42c1;color:#fff}
</style>
</head>

<body>

<header>
  <h1>📝 Manage Tests</h1>
  <div class="logout" onclick="logout()">Logout</div>
</header>

<div class="container">
  <aside>
    <div class="menu">
      <a href="dashboard.html">🏠 Dashboard</a>
      <a class="active" href="tests.html">📝 Tests</a>
      <a href="questions.html">❓ Questions</a>
    </div>
  </aside>

  <main>
    <!-- TOOLBAR -->
    <div class="toolbar">
      <input id="search" placeholder="Search test name">
      <select id="filterExam">
        <option value="">All Exams</option>
        <option>SSC</option>
        <option>UPSC</option>
        <option>Banking</option>
      </select>
      <select id="filterStatus">
        <option value="">All Status</option>
        <option value="draft">Draft</option>
        <option value="published">Published</option>
        <option value="closed">Closed</option>
      </select>
      <button onclick="loadTests()">🔄 Refresh</button>
      <button onclick="location.href='create-test.html'">➕ Create Test</button>
    </div>

    <!-- TABLE -->
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Exam</th>
            <th>Subject</th>
            <th>Questions</th>
            <th>Duration</th>
            <th>Instructions</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* AUTH */
const admin = JSON.parse(localStorage.getItem("employee"));
if(!admin || admin.role!=="admin") location.href="/login.html";

/* SUPABASE */
const sb = supabase.createClient(
  "https://qzriaykqdrhbtcgbpxpg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6cmlheWtxZHJoYnRjZ2JweHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAwMTcwMTAsImV4cCI6MjA3NTU5MzAxMH0.qRAQumkwN-JtxDizWwLRfPa8t0N68YGWdYKhQrhx7e8"

);

/* LOAD TESTS */
async function loadTests(){
  const q = search.value.toLowerCase();
  const exam = filterExam.value;
  const status = filterStatus.value;

  let query = sb.from("tests").select("*").order("created_at",{ascending:false});
  if(exam) query = query.eq("exam",exam);
  if(status) query = query.eq("status",status);

  const { data, error } = await query;
  tbody.innerHTML="";

  if(error){ alert(error.message); return; }

  data
    .filter(t => t.name.toLowerCase().includes(q))
    .forEach(t=>{
      tbody.innerHTML += `
        <tr>
          <td>${t.name}</td>
          <td>${t.exam}</td>
          <td>${t.subject}</td>
          <td>${t.total_questions}</td>
          <td>${t.duration} min</td>
          <td>${t.instructions}</td>
          <td><span class="status ${t.status}">${t.status.toUpperCase()}</span></td>
          <td class="actions">
            <button class="edit" onclick="editTest('${t.id}')">Edit</button>
            <button class="view" onclick="viewQuestions('${t.id}')">Questions</button>
            ${
              t.status==="published"
              ? `<button class="publish" onclick="updateStatus('${t.id}','draft')">Unpublish</button>`
              : `<button class="publish" onclick="updateStatus('${t.id}','published')">Publish</button>`
            }
            <button class="delete" onclick="deleteTest('${t.id}')">Delete</button>
          </td>
        </tr>`;
    });
}
loadTests();

/* ACTIONS */
function editTest(id){
  location.href = `edit-test.html?id=${id}`;
}
function viewQuestions(id){
  location.href = `questions.html?test_id=${id}`;
}
async function updateStatus(id,status){
  await sb.from("tests").update({status}).eq("id",id);
  loadTests();
}
async function deleteTest(id){
  if(confirm("Delete this test?")){
    await sb.from("tests").delete().eq("id",id);
    loadTests();
  }
}
function logout(){
  localStorage.removeItem("employee");
  location.href="/admin/login.html";
}

/* FILTER EVENTS */
search.oninput = loadTests;
filterExam.onchange = loadTests;
filterStatus.onchange = loadTests;
</script>

</body>
</html>
