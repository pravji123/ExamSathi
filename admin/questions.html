<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question Approval | Testara</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:"Segoe UI",Arial}
body{margin:0;background:#f4f6f8}

/* Header */
header{
  background:#004aad;color:#fff;
  padding:16px 24px;
  display:flex;justify-content:space-between;align-items:center;
}
header h1{margin:0;font-size:20px}
.logout{
  background:#fff;color:#004aad;
  padding:8px 14px;border-radius:8px;
  font-weight:600;cursor:pointer;
}

/* Layout */
.container{
  display:grid;
  grid-template-columns:260px 1fr;
  min-height:calc(100vh - 64px);
}
aside{
  background:#fff;padding:20px;border-right:1px solid #ddd;
}
.menu a{
  display:block;padding:12px;border-radius:8px;
  text-decoration:none;color:#333;margin-bottom:8px;
}
.menu a.active,.menu a:hover{background:#e0e7ff}

/* Main */
main{padding:24px}

/* Card */
.card{
  background:#fff;
  padding:20px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  margin-bottom:20px;
}

/* Table */
table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #eee;font-size:14px}
th{background:#f1f5ff;text-align:left}

/* Question box */
.q-box{
  border:1px solid #ddd;
  padding:14px;
  border-radius:10px;
  margin-bottom:12px;
}
.status{
  padding:3px 10px;border-radius:20px;
  font-size:12px;font-weight:600;
}
.pending{background:#fff3cd;color:#856404}
.approved{background:#d4edda;color:#155724}
.rejected{background:#f8d7da;color:#842029}

button{
  padding:6px 12px;
  border:none;border-radius:6px;
  cursor:pointer;font-size:13px;
}
.approve{background:#198754;color:#fff}
.reject{background:#dc2626;color:#fff}
.view{background:#0d6efd;color:#fff}
.back{background:#6c757d;color:#fff}
</style>
</head>

<body>

<header>
  <h1>Question Approval</h1>
  <div class="logout" onclick="logout()">Logout</div>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <aside>
    <div class="menu">
      <a href="dashboard.html">Dashboard</a>
      <a class="active">Question Approval</a>
    </div>
  </aside>

  <!-- MAIN -->
  <main>

    <!-- TASK LIST -->
    <div class="card" id="taskCard">
      <h3>Task Wise Questions</h3>
      <table>
        <thead>
          <tr>
            <th>Exam</th>
            <th>Subject</th>
            <th>Employee</th>
            <th>Total Q</th>
            <th>Pending</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="taskBody"></tbody>
      </table>
    </div>

    <!-- QUESTION LIST -->
    <div class="card" id="questionCard" style="display:none">
      <button class="back" onclick="backToTasks()">⬅ Back</button>
      <h3 style="margin-top:10px">Task Questions</h3>
      <div id="questionList"></div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/admin/auth.js"></script>
<script>
/* 🔐 AUTH */
const emp = requireAuth();
if(emp.role !== "admin"){
  alert("Access denied");
  location.href="dashboard.html";
}

/* SUPABASE */
const sb = supabase.createClient(
  "https://qzriaykqdrhbtcgbpxpg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6cmlheWtxZHJoYnRjZ2JweHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAwMTcwMTAsImV4cCI6MjA3NTU5MzAxMH0.qRAQumkwN-JtxDizWwLRfPa8t0N68YGWdYKhQrhx7e8"
);

const taskBody = document.getElementById("taskBody");
const taskCard = document.getElementById("taskCard");
const questionCard = document.getElementById("questionCard");
const questionList = document.getElementById("questionList");

/* LOAD TASKS */
async function loadTasks(){
  const { data, error } = await sb
  .from("tasks")
  .select(`
    id,
    exam,
    subject,
    total_questions,
    employees!tasks_employee_id_fkey (
      name
    ),
    questions (
      id,
      status
    )
  `);


  taskBody.innerHTML = "";

  if(error){
    taskBody.innerHTML = `<tr><td colspan="6">${error.message}</td></tr>`;
    return;
  }

  data.forEach(t=>{
    const pending = t.questions.filter(q=>q.status==="pending").length;

    taskBody.innerHTML += `
      <tr>
        <td>${t.exam}</td>
        <td>${t.subject}</td>
        <td>${t.employees?.name || "-"}</td>
        <td>${t.questions.length}</td>
        <td>${pending}</td>
        <td>
          <button class="view" onclick="openTask('${t.id}')">
            View
          </button>
        </td>
      </tr>
    `;
  });
}

/* OPEN TASK QUESTIONS */
async function openTask(taskId){
  taskCard.style.display="none";
  questionCard.style.display="block";
  questionList.innerHTML="Loading...";

  const { data, error } = await sb
    .from("questions")
    .select(`
      id,
      question_json,
      status,
      employees(name)
    `)
    .eq("task_id", taskId)
    .order("created_at");

  if(error){
    questionList.innerText = error.message;
    return;
  }

  questionList.innerHTML="";
  data.forEach((q,i)=>{
    questionList.innerHTML += `
      <div class="q-box">
        <b>Q${i+1}.</b> ${q.question_json.question}<br><br>
        <small>By: ${q.employees?.name || "-"}</small><br>
        <span class="status ${q.status}">${q.status.toUpperCase()}</span>
        <br><br>

        ${
          q.status==="pending"
          ? `
            <button class="approve" onclick="updateStatus('${q.id}','approved','${taskId}')">Approve</button>
            <button class="reject" onclick="updateStatus('${q.id}','rejected','${taskId}')">Reject</button>
          `
          : `<i>No action available</i>`
        }
      </div>
    `;
  });
}

/* UPDATE STATUS */
async function updateStatus(qid,status,taskId){
  const { error } = await sb
    .from("questions")
    .update({ status })
    .eq("id", qid);

  if(error){
    alert(error.message);
    return;
  }

  openTask(taskId);
}

/* BACK */
function backToTasks(){
  questionCard.style.display="none";
  taskCard.style.display="block";
  loadTasks();
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("employee");
  location.href="/admin/login.html";
}

loadTasks();
</script>

</body>
</html>
